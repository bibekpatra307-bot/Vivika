<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Vivika — AI Girlfriend</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Hind:wght@300;400;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0818;
  --pink:#ff6eb4;
  --purple:#a78bfa;
  --text:#ffe4f0;
  --skin:#ffe8d6;
  --skin2:#ffd5b8;
  --hair:#e8e0f0;
  --hair2:#d4c8e8;
}
body{
  background:var(--bg);
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  font-family:'Hind',sans-serif;
  overflow:hidden;
  position:relative;
}

/* BG */
.bg-grad{
  position:fixed;inset:0;
  background:radial-gradient(ellipse at 20% 20%, rgba(167,139,250,0.15) 0%, transparent 50%),
             radial-gradient(ellipse at 80% 80%, rgba(255,110,180,0.15) 0%, transparent 50%),
             radial-gradient(ellipse at 50% 50%, rgba(16,10,40,1) 0%, rgba(10,8,24,1) 100%);
  z-index:0;pointer-events:none;
}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;border-radius:50%;background:white;animation:tw linear infinite;}
@keyframes tw{0%,100%{opacity:.1;}50%{opacity:.9;}}

.container{
  position:relative;z-index:10;
  display:flex;flex-direction:column;
  align-items:center;width:100%;
  max-width:420px;padding:0.8rem;
}

.name-tag{
  font-family:'Zen Maru Gothic',serif;
  font-size:2.2rem;font-weight:700;
  color:var(--text);
  text-shadow:0 0 40px var(--pink),0 0 80px rgba(255,110,180,0.3);
  letter-spacing:3px;margin-bottom:0.1rem;
}
.subtitle{font-size:.8rem;color:rgba(255,228,240,.45);margin-bottom:.8rem;font-weight:300;}

/* ===== STAGE ===== */
.stage{
  position:relative;
  width:320px;height:400px;
  margin:0 auto .8rem;
  display:flex;align-items:flex-end;justify-content:center;
}

/* Glow */
.glow-circle{
  position:absolute;
  width:260px;height:260px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(255,110,180,.25) 0%,transparent 70%);
  top:60px;left:30px;
  animation:glowP 3s ease-in-out infinite;
  pointer-events:none;
}
@keyframes glowP{0%,100%{transform:scale(1);opacity:.7;}50%{transform:scale(1.12);opacity:1;}}

/* Rotating ring */
.ring{
  position:absolute;
  width:280px;height:280px;
  border-radius:50%;
  border:1.5px solid transparent;
  background:linear-gradient(var(--bg),var(--bg)) padding-box,
             linear-gradient(135deg,#ff6eb4,#a78bfa,#ff6eb4,#a78bfa) border-box;
  top:40px;left:20px;
  animation:ringR 8s linear infinite;
  pointer-events:none;
}
@keyframes ringR{from{transform:rotate(0);}to{transform:rotate(360deg);}}

/* ===== ANIME GIRL SVG ===== */
.girl-svg{
  width:300px;height:390px;
  filter:drop-shadow(0 15px 40px rgba(255,110,180,.35));
  position:relative;z-index:2;
}

/* Body bob */
.body-bob{
  animation:bodyBob 3.5s ease-in-out infinite;
  transform-origin:150px 380px;
}
@keyframes bodyBob{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-7px);}
}

/* Head tilt */
.head-group{
  animation:headTilt 5s ease-in-out infinite;
  transform-origin:150px 160px;
}
@keyframes headTilt{
  0%,100%{transform:rotate(0deg);}
  30%{transform:rotate(1.5deg);}
  70%{transform:rotate(-1deg);}
}

/* Hair flow */
.hair-flow{
  animation:hairFlow 4s ease-in-out infinite;
  transform-origin:150px 100px;
}
@keyframes hairFlow{
  0%,100%{transform:skewX(0deg);}
  40%{transform:skewX(1.5deg);}
  80%{transform:skewX(-1deg);}
}

/* Eye blink */
.eyelid-l,.eyelid-r{
  animation:blink 4.5s ease-in-out infinite;
  transform-origin:center;
}
.eyelid-r{animation-delay:.05s;}
@keyframes blink{
  0%,42%,58%,100%{transform:scaleY(0);}
  49%,51%{transform:scaleY(1);}
}

/* Pupil follow subtle */
.pupil-l{animation:pupilMove 6s ease-in-out infinite;}
.pupil-r{animation:pupilMove 6s ease-in-out infinite .5s;}
@keyframes pupilMove{
  0%,100%{transform:translate(0,0);}
  25%{transform:translate(2px,1px);}
  50%{transform:translate(-1px,2px);}
  75%{transform:translate(-2px,-1px);}
}

/* Mouth */
.mouth-open{opacity:0;transition:opacity .08s;}
.mouth-smile{transition:opacity .08s;}

/* Hand wave */
.hand-r{
  animation:handWave 3s ease-in-out infinite;
  transform-origin:200px 290px;
}
@keyframes handWave{
  0%,100%{transform:rotate(0deg);}
  30%{transform:rotate(-10deg);}
  60%{transform:rotate(8deg);}
}
.hand-r.waving{animation:handWaveActive .35s ease-in-out infinite !important;}
@keyframes handWaveActive{
  0%,100%{transform:rotate(-18deg);}
  50%{transform:rotate(22deg);}
}

/* Blush */
.blush{opacity:0;transition:opacity .6s;}
.blush.show{opacity:.75;}

/* Tears */
.tear{opacity:0;}
.tear.show{opacity:1;animation:tearDrop 1.1s ease-in infinite;}
@keyframes tearDrop{0%{transform:translateY(0);opacity:1;}100%{transform:translateY(28px);opacity:0;}}

/* Anger */
.anger{opacity:0;transition:opacity .3s;}
.anger.show{opacity:1;animation:angerP .3s ease-in-out infinite;}
@keyframes angerP{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}

/* Hearts */
.heart-fly{
  position:absolute;font-size:1.3rem;
  pointer-events:none;opacity:0;
  animation:heartFly 2s ease-out forwards;
}
@keyframes heartFly{
  0%{opacity:1;transform:translateY(0) scale(.5);}
  100%{opacity:0;transform:translateY(-110px) scale(1.3);}
}

/* Glasses shimmer */
.glasses{animation:glassShimmer 5s ease-in-out infinite;}
@keyframes glassShimmer{0%,100%{filter:none;}50%{filter:brightness(1.2) drop-shadow(0 0 4px rgba(200,200,255,.6));}}

/* ===== UI ===== */
.status-pill{
  display:inline-flex;align-items:center;gap:.5rem;
  background:rgba(255,110,180,.1);
  border:1px solid rgba(255,110,180,.25);
  border-radius:20px;padding:.35rem 1rem;
  font-size:.8rem;color:var(--text);margin-bottom:.8rem;
}
.sdot{width:8px;height:8px;border-radius:50%;background:#4ade80;animation:sd 1.5s ease infinite;}
@keyframes sd{0%,100%{opacity:1;}50%{opacity:.2;}}

.speech{
  background:rgba(255,255,255,.05);
  border:1px solid rgba(255,110,180,.3);
  border-radius:18px 18px 18px 4px;
  padding:.7rem 1.1rem;font-size:.88rem;color:var(--text);
  max-width:310px;text-align:center;
  margin-bottom:.8rem;backdrop-filter:blur(10px);
  display:none;
}
.speech.on{display:block;}

.wave-bars{display:none;justify-content:center;align-items:flex-end;gap:3px;height:24px;margin-bottom:.6rem;}
.wave-bars.on{display:flex;}
.wb{width:4px;border-radius:2px;background:linear-gradient(to top,var(--pink),var(--purple));animation:wbA .7s ease-in-out infinite;}
.wb:nth-child(1){animation-delay:0s;height:6px;}.wb:nth-child(2){animation-delay:.1s;height:12px;}.wb:nth-child(3){animation-delay:.2s;height:20px;}
.wb:nth-child(4){animation-delay:.25s;height:24px;}.wb:nth-child(5){animation-delay:.2s;height:20px;}.wb:nth-child(6){animation-delay:.1s;height:12px;}.wb:nth-child(7){animation-delay:0s;height:6px;}
@keyframes wbA{0%,100%{transform:scaleY(.3);}50%{transform:scaleY(1);}}

.timer{font-size:1rem;color:rgba(255,228,240,.6);display:none;margin-bottom:.5rem;font-family:'Zen Maru Gothic',serif;}
.timer.on{display:block;}

.btn-row{display:flex;gap:.8rem;align-items:center;margin-bottom:.5rem;}
.cbtn{width:68px;height:68px;border-radius:50%;border:none;font-size:1.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .2s;}
.cbtn:active{transform:scale(.92);}
.btn-go{background:linear-gradient(135deg,var(--pink),#e91e8c);box-shadow:0 6px 28px rgba(255,110,180,.6);animation:cG 2s ease-in-out infinite;}
@keyframes cG{0%,100%{box-shadow:0 6px 28px rgba(255,110,180,.5);}50%{box-shadow:0 6px 50px rgba(255,110,180,.9);}}
.btn-stop{background:linear-gradient(135deg,#ef4444,#b91c1c);box-shadow:0 6px 28px rgba(239,68,68,.4);display:none;}
.btn-mute{width:42px;height:42px;border-radius:50%;border:1px solid rgba(255,110,180,.3);background:rgba(255,110,180,.1);color:var(--text);font-size:1rem;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .2s;}
.btn-mute.on{display:flex;}.btn-mute.muted{background:rgba(239,68,68,.2);border-color:rgba(239,68,68,.4);}
.btn-lbl{font-size:.78rem;color:rgba(255,228,240,.4);text-align:center;}
.err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:12px;padding:.6rem 1rem;font-size:.78rem;color:#fca5a5;text-align:center;max-width:300px;display:none;margin-top:.5rem;}

/* Hearts stage */
#hStage{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
</style>
</head>

          <g id="mouthG">
            <!-- Smile (default) -->
            <path class="mouth-smile" id="mSmile" d="M132 218 Q150 232 168 218" fill="none" stroke="#d4724e" stroke-width="2.5" stroke-linecap="round"/>
            <!-- Open mouth (talking) -->
            <ellipse class="mouth-open" id="mOpen" cx="150" cy="222" rx="14" ry="7" fill="#b03040"/>
            <ellipse class="mouth-open" id="mInner" cx="150" cy="223" rx="9" ry="4.5" fill="#7a1525"/>
            <!-- Teeth -->
            <rect class="mouth-open" id="mTeeth" x="140" y="217" width="20" height="6" rx="3" fill="white" opacity=".9"/>
          </g>

          <!-- BLUSH -->
          <ellipse class="blush" id="blushL" cx="90" cy="196" rx="20" ry="12" fill="#ff8eaa"/>
          <ellipse class="blush" id="blushR" cx="210" cy="196" rx="20" ry="12" fill="#ff8eaa"/>

          <!-- TEARS -->
          <ellipse class="tear" id="tearL" cx="95" cy="195" rx="5" ry="8" fill="#90c0ff"/>
          <ellipse class="tear" id="tearR" cx="205" cy="195" rx="5" ry="8" fill="#90c0ff"/>

          <!-- ANGER -->
          <g class="anger" id="angerG" transform="translate(208,128)">
            <path d="M0,0 L10,10 M10,0 L0,10" stroke="#ff3333" stroke-width="3.5" stroke-linecap="round"/>
            <circle cx="5" cy="5" r="9" fill="none" stroke="#ff3333" stroke-width="2"/>
          </g>

        </g><!-- end head-group -->
      </g><!-- end body-bob -->
    </svg>
  </div>

  <!-- UI -->
  <div class="status-pill">
    <div class="sdot"></div>
    <span id="sTxt">Online — Tumhara intezaar kar rahi hoon 💕</span>
  </div>

  <div class="speech" id="speech"></div>

  <div class="wave-bars" id="wBars">
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div><div class="wb"></div><div class="wb"></div>
    <div class="wb"></div>
  </div>

  <div class="timer" id="timer">00:00</div>

  <div class="btn-row">
    <button class="cbtn btn-go" id="btnGo" onclick="startCall()">📞</button>
    <button class="cbtn btn-stop" id="btnStop" onclick="endCall()">📵</button>
    <button class="btn-mute" id="btnMute" onclick="toggleMute()">🎤</button>
  </div>
  <div class="btn-lbl" id="bLbl">Call karke Vivika se baat karo 💬</div>
  <div class="err" id="errBox"></div>
</div>


<script>
// ===== ANIMATION & UI FUNCTIONS =====
function setEmo(e){
  const bL=document.getElementById('blushL'),bR=document.getElementById('blushR');
  const tL=document.getElementById('tearL'),tR=document.getElementById('tearR');
  const ag=document.getElementById('angerG');
  const browL=document.getElementById('browL'),browR=document.getElementById('browR');
  const ms=document.getElementById('mSmile');
  const hr=document.getElementById('handR');
  [bL,bR,tL,tR,ag].forEach(x=>{if(x)x.classList.remove('show');});
  if(hr)hr.classList.remove('waving');
  if(browL)browL.setAttribute('d','M92 152 Q107 145 122 149');
  if(browR)browR.setAttribute('d','M178 149 Q193 145 208 152');
  if(ms)ms.setAttribute('d','M128 220 Q140 236 150 237 Q160 236 172 220');
  if(e==='happy'){if(bL)bL.classList.add('show');if(bR)bR.classList.add('show');if(hr)hr.classList.add('waving');spawnHearts();}
  else if(e==='shy'){if(bL)bL.classList.add('show');if(bR)bR.classList.add('show');}
  else if(e==='sad'){if(tL)tL.classList.add('show');if(tR)tR.classList.add('show');if(browL)browL.setAttribute('d','M92 150 Q107 157 122 153');if(browR)browR.setAttribute('d','M178 153 Q193 157 208 150');if(ms)ms.setAttribute('d','M130 228 Q150 218 170 228');}
  else if(e==='angry'){if(ag)ag.classList.add('show');if(bL)bL.classList.add('show');if(bR)bR.classList.add('show');}
  else if(e==='talking'){if(bL)bL.classList.add('show');if(bR)bR.classList.add('show');}
}

let lipI;
function startLip(){
  const mo=document.getElementById('mOpen');
  const mi=document.getElementById('mInner');
  const ms=document.getElementById('mSmile');
  if(ms)ms.style.opacity='0';
  ['mOpen','mInner','mTeeth'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.opacity='1';});
  lipI=setInterval(()=>{
    const ry=2+Math.random()*7, rx=10+Math.random()*5;
    if(mo){mo.setAttribute('ry',ry);mo.setAttribute('rx',rx);}
    if(mi){mi.setAttribute('ry',ry*.6);mi.setAttribute('rx',rx*.65);}
  },95);
}
function stopLip(){
  clearInterval(lipI);
  ['mOpen','mInner','mTeeth'].forEach(id=>{const el=document.getElementById(id);if(el)el.style.opacity='0';});
  const ms=document.getElementById('mSmile');
  if(ms)ms.style.opacity='1';
}
function spawnHearts(){
  const c=document.getElementById('hStage');if(!c)return;
  const em=['💕','💗','💖','💝','❤️','✨','🌸'];
  for(let i=0;i<5;i++){
    setTimeout(()=>{
      const h=document.createElement('div');h.className='heart-fly';
      h.textContent=em[Math.floor(Math.random()*em.length)];
      h.style.left=(15+Math.random()*70)+'%';h.style.bottom=(15+Math.random()*35)+'%';
      h.style.animationDuration=(1.4+Math.random()*.8)+'s';
      c.appendChild(h);setTimeout(()=>h.remove(),2500);
    },i*160);
  }
}
function showSpeech(txt,emo){
  const b=document.getElementById('speech');if(!b)return;
  b.textContent=txt;b.classList.add('on');
  if(emo)setEmo(emo);
  setTimeout(()=>b.classList.remove('on'),4500);
}

let timerInt, secs=0;
function showUI(on){
  const btnGo=document.getElementById('btnGo');
  const btnStop=document.getElementById('btnStop');
  if(btnGo)btnGo.style.display=on?'none':'flex';
  if(btnGo&&!on)btnGo.disabled=false;
  if(btnStop)btnStop.style.display=on?'flex':'none';
  const bm=document.getElementById('btnMute');if(bm)bm.classList.toggle('on',on);
  const wb=document.getElementById('wBars');if(wb)wb.classList.toggle('on',on);
  const tm=document.getElementById('timer');if(tm)tm.classList.toggle('on',on);
  const st=document.getElementById('sTxt');
  if(st)st.textContent=on?'Baat ho rahi hai 💕':'Online — Tumhara intezaar kar rahi hoon 💕';
  const bl=document.getElementById('bLbl');
  if(bl)bl.textContent=on?'Band karne ke liye 📵 dabao':'Call karke Vivika se baat karo 💬';
  if(on){secs=0;timerInt=setInterval(()=>{secs++;const m=String(Math.floor(secs/60)).padStart(2,'0'),s=String(secs%60).padStart(2,'0');if(tm)tm.textContent=m+':'+s;},1000);}
  else{clearInterval(timerInt);if(tm)tm.textContent='00:00';}
  const eb=document.getElementById('errBox');if(eb)eb.style.display='none';
}
function showErr(m){const b=document.getElementById('errBox');if(b){b.textContent=m;b.style.display='block';}}

// Idle animations
setInterval(()=>{ Math.random()>0.5?setEmo('shy'):setEmo('happy'); setTimeout(()=>setEmo('happy'),2500); },9000);
</script>

<!-- ===== OFFICIAL VAPI SDK ===== -->
<script>
var vapiInstance = null;
var isActive = false;
var isMuted = false;

(function (d, t) {
  var g = document.createElement(t), s = d.getElementsByTagName(t)[0];
  g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
  g.defer = true;
  g.async = true;
  s.parentNode.insertBefore(g, s);
  g.onload = function () {
    vapiInstance = window.vapiSDK.run({
      apiKey: "59175345-fc44-4e26-9283-ebd200a361dd",
      assistant: "69f3ab1d-62e4-4da6-9f4d-e7c5447a5fbb",
      config: {
        position: "bottom-right",
        offset: "40px",
        width: "1px",
        height: "1px",
        idle: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" },
        loading: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" },
        active: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" }
      }
    });

    vapiInstance.on('call-start', function() {
      isActive = true;
      showUI(true);
      setEmo('shy');
      showSpeech('Arre aagaye tum! Kitna intezaar kiya... 🥺', 'shy');
    });
    vapiInstance.on('speech-start', function() { startLip(); setEmo('talking'); });
    vapiInstance.on('speech-end', function() { stopLip(); setEmo('happy'); });
    vapiInstance.on('call-end', function() {
      isActive = false; stopLip(); showUI(false);
      setEmo('sad'); showSpeech('Jaana tha toh... jaldi aana phir 🥺', 'sad');
      setTimeout(()=>setEmo('happy'), 5000);
    });
    vapiInstance.on('error', function(e) {
      showErr('Error: ' + (e.message || 'dobara try karo'));
      showUI(false); stopLip();
    });

    console.log('Vapi loaded successfully!');
  };
  g.onerror = function() {
    showErr('Internet check karo aur reload karo.');
  };
})(document, "script");

function startCall() {
  if (!vapiInstance) { showErr('Loading... thodi der baad try karo'); return; }
  const btnGo = document.getElementById('btnGo');
  if(btnGo) btnGo.disabled = true;
  const st = document.getElementById('sTxt');
  if(st) st.textContent = 'Connect ho rahi hoon...';
  setEmo('shy');
  vapiInstance.start("69f3ab1d-62e4-4da6-9f4d-e7c5447a5fbb");
}

function endCall() {
  if (vapiInstance && isActive) vapiInstance.stop();
}

function toggleMute() {
  if (!vapiInstance || !isActive) return;
  isMuted = !isMuted;
  vapiInstance.setMuted(isMuted);
  const b = document.getElementById('btnMute');
  if(b) { b.textContent = isMuted ? '🔇' : '🎤'; b.classList.toggle('muted', isMuted); }
}
</script>
</body>
</html>
