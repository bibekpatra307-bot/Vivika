<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vivika — AI Girlfriend</title>
    <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Hind:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <style>
        /* ── reset & base ── */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg: #0a0818;
            --pink: #ff6eb4;
            --purple: #a78bfa;
            --text: #ffe4f0;
            --skin: #ffe8d6;
            --skin2: #ffd5b8;
            --hair: #e8e0f0;
            --hair2: #d4c8e8;
            --glass: rgba(255, 255, 255, 0.04);
            --border-subtle: rgba(255, 110, 180, 0.15);
            --shadow-glow: 0 8px 40px rgba(255, 110, 180, 0.25);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Hind', sans-serif;
            overflow-x: hidden;
            position: relative;
            padding: 1rem;
        }

        /* ── background ── */
        .bg-grad {
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(167, 139, 250, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(255, 110, 180, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(16, 10, 40, 1) 0%, rgba(10, 8, 24, 1) 100%);
            z-index: 0;
            pointer-events: none;
        }

        .stars {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            border-radius: 50%;
            background: #fff;
            animation: twinkle var(--d, 3s) ease-in-out infinite;
            width: var(--s, 3px);
            height: var(--s, 3px);
            top: var(--y, 10%);
            left: var(--x, 10%);
            opacity: 0.2;
        }
        @keyframes twinkle {
            0%,
            100% {
                opacity: 0.1;
                transform: scale(0.8);
            }
            50% {
                opacity: 0.9;
                transform: scale(1.2);
            }
        }

        /* ── container ── */
        .container {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 460px;
            padding: 0.6rem 0.8rem 1.6rem;
            background: rgba(10, 8, 24, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 32px 32px;
            border: 1px solid rgba(255, 110, 180, 0.08);
            box-shadow: 0 20px 80px rgba(0, 0, 0, 0.7), 0 0 60px rgba(167, 139, 250, 0.05);
        }

        /* ── header ── */
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            padding-bottom: 0.2rem;
        }

        .name-tag {
            font-family: 'Zen Maru Gothic', serif;
            font-size: 2.4rem;
            font-weight: 700;
            color: var(--text);
            text-shadow: 0 0 40px var(--pink), 0 0 80px rgba(255, 110, 180, 0.25);
            letter-spacing: 4px;
            line-height: 1.2;
        }
        .name-tag span {
            display: inline-block;
            animation: namePulse 3s ease-in-out infinite;
        }
        @keyframes namePulse {
            0%,
            100% {
                text-shadow: 0 0 40px var(--pink), 0 0 80px rgba(255, 110, 180, 0.25);
            }
            50% {
                text-shadow: 0 0 60px var(--pink), 0 0 120px rgba(255, 110, 180, 0.4);
            }
        }

        .subtitle {
            font-size: 0.8rem;
            color: rgba(255, 228, 240, 0.45);
            font-weight: 300;
            letter-spacing: 2px;
            margin-top: -2px;
        }

        .badge-row {
            display: flex;
            gap: 0.6rem;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 0.3rem;
            margin-bottom: 0.5rem;
        }
        .badge {
            font-size: 0.6rem;
            font-weight: 400;
            color: rgba(255, 228, 240, 0.5);
            background: rgba(255, 110, 180, 0.06);
            border: 1px solid rgba(255, 110, 180, 0.08);
            padding: 0.2rem 0.8rem;
            border-radius: 20px;
            letter-spacing: 0.5px;
            backdrop-filter: blur(4px);
        }

        /* ── stage ── */
        .stage {
            position: relative;
            width: 320px;
            height: 400px;
            margin: 0 auto 0.4rem;
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }

        .glow-circle {
            position: absolute;
            width: 260px;
            height: 260px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255, 110, 180, 0.2) 0%, transparent 70%);
            top: 60px;
            left: 30px;
            animation: glowP 3.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glowP {
            0%,
            100% {
                transform: scale(1);
                opacity: 0.6;
            }
            50% {
                transform: scale(1.15);
                opacity: 1;
            }
        }

        .ring {
            position: absolute;
            width: 280px;
            height: 280px;
            border-radius: 50%;
            border: 1.5px solid transparent;
            background: linear-gradient(var(--bg), var(--bg)) padding-box,
                linear-gradient(135deg, #ff6eb4, #a78bfa, #ff6eb4, #a78bfa) border-box;
            top: 40px;
            left: 20px;
            animation: ringR 10s linear infinite;
            pointer-events: none;
            opacity: 0.35;
        }
        @keyframes ringR {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        #hStage {
            position: absolute;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        /* ── SVG ── */
        .girl-svg {
            width: 300px;
            height: 390px;
            filter: drop-shadow(0 15px 40px rgba(255, 110, 180, 0.35));
            position: relative;
            z-index: 2;
            transition: filter 0.6s;
        }
        .girl-svg.active {
            filter: drop-shadow(0 15px 50px rgba(255, 110, 180, 0.6));
        }

        .body-bob {
            animation: bodyBob 3.5s ease-in-out infinite;
            transform-origin: 150px 380px;
        }
        @keyframes bodyBob {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-7px);
            }
        }

        .head-group {
            animation: headTilt 5s ease-in-out infinite;
            transform-origin: 150px 160px;
        }
        @keyframes headTilt {
            0%,
            100% {
                transform: rotate(0deg);
            }
            30% {
                transform: rotate(1.5deg);
            }
            70% {
                transform: rotate(-1deg);
            }
        }

        .hair-flow {
            animation: hairFlow 4.5s ease-in-out infinite;
            transform-origin: 150px 100px;
        }
        @keyframes hairFlow {
            0%,
            100% {
                transform: skewX(0deg);
            }
            40% {
                transform: skewX(1.8deg);
            }
            80% {
                transform: skewX(-1.2deg);
            }
        }

        .eyelid-l,
        .eyelid-r {
            animation: blink 4.5s ease-in-out infinite;
            transform-origin: center;
        }
        .eyelid-r {
            animation-delay: 0.05s;
        }
        @keyframes blink {
            0%,
            42%,
            58%,
            100% {
                transform: scaleY(0);
            }
            49%,
            51% {
                transform: scaleY(1);
            }
        }

        .pupil-l {
            animation: pupilMove 6s ease-in-out infinite;
        }
        .pupil-r {
            animation: pupilMove 6s ease-in-out infinite 0.5s;
        }
        @keyframes pupilMove {
            0%,
            100% {
                transform: translate(0, 0);
            }
            25% {
                transform: translate(2px, 1px);
            }
            50% {
                transform: translate(-1px, 2px);
            }
            75% {
                transform: translate(-2px, -1px);
            }
        }

        .mouth-open {
            opacity: 0;
            transition: opacity 0.08s;
        }
        .mouth-smile {
            transition: opacity 0.08s;
        }

        .hand-r {
            animation: handWave 3.2s ease-in-out infinite;
            transform-origin: 200px 290px;
        }
        @keyframes handWave {
            0%,
            100% {
                transform: rotate(0deg);
            }
            30% {
                transform: rotate(-10deg);
            }
            60% {
                transform: rotate(8deg);
            }
        }
        .hand-r.waving {
            animation: handWaveActive 0.35s ease-in-out infinite !important;
        }
        @keyframes handWaveActive {
            0%,
            100% {
                transform: rotate(-18deg);
            }
            50% {
                transform: rotate(22deg);
            }
        }

        .blush {
            opacity: 0;
            transition: opacity 0.6s;
        }
        .blush.show {
            opacity: 0.7;
        }

        .tear {
            opacity: 0;
        }
        .tear.show {
            opacity: 1;
            animation: tearDrop 1.2s ease-in infinite;
        }
        @keyframes tearDrop {
            0% {
                transform: translateY(0);
                opacity: 1;
            }
            100% {
                transform: translateY(30px);
                opacity: 0;
            }
        }

        .anger {
            opacity: 0;
            transition: opacity 0.3s;
        }
        .anger.show {
            opacity: 1;
            animation: angerP 0.3s ease-in-out infinite;
        }
        @keyframes angerP {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.25);
            }
        }

        .heart-fly {
            position: absolute;
            font-size: 1.4rem;
            pointer-events: none;
            opacity: 0;
            animation: heartFly 2.2s ease-out forwards;
            filter: drop-shadow(0 0 8px rgba(255, 110, 180, 0.4));
        }
        @keyframes heartFly {
            0% {
                opacity: 1;
                transform: translateY(0) scale(0.4) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translateY(-120px) scale(1.4) rotate(20deg);
            }
        }

        .glasses {
            animation: glassShimmer 5s ease-in-out infinite;
        }
        @keyframes glassShimmer {
            0%,
            100% {
                filter: none;
            }
            50% {
                filter: brightness(1.15) drop-shadow(0 0 6px rgba(200, 200, 255, 0.5));
            }
        }

        /* ── status ── */
        .status-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: rgba(255, 110, 180, 0.07);
            border: 1px solid rgba(255, 110, 180, 0.15);
            border-radius: 24px;
            padding: 0.3rem 1.2rem;
            font-size: 0.75rem;
            color: var(--text);
            margin-bottom: 0.5rem;
            backdrop-filter: blur(6px);
            transition: all 0.4s;
        }
        .status-pill.active {
            border-color: rgba(255, 110, 180, 0.4);
            background: rgba(255, 110, 180, 0.12);
            box-shadow: 0 0 30px rgba(255, 110, 180, 0.08);
        }
        .sdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: sd 1.5s ease infinite;
            transition: background 0.4s;
        }
        .sdot.inactive {
            background: #f87171;
        }
        @keyframes sd {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.2;
                transform: scale(0.7);
            }
        }

        /* ── speech ── */
        .speech {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 110, 180, 0.15);
            border-radius: 18px 18px 18px 4px;
            padding: 0.7rem 1.2rem;
            font-size: 0.9rem;
            color: var(--text);
            max-width: 320px;
            text-align: center;
            margin-bottom: 0.6rem;
            backdrop-filter: blur(10px);
            display: none;
            min-height: 3rem;
            transition: all 0.3s;
            line-height: 1.5;
        }
        .speech.on {
            display: block;
            animation: speechIn 0.35s ease-out;
        }
        @keyframes speechIn {
            0% {
                opacity: 0;
                transform: translateY(8px) scale(0.96);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* ── wave bars ── */
        .wave-bars {
            display: none;
            justify-content: center;
            align-items: flex-end;
            gap: 3px;
            height: 26px;
            margin-bottom: 0.4rem;
        }
        .wave-bars.on {
            display: flex;
        }
        .wb {
            width: 4px;
            border-radius: 3px;
            background: linear-gradient(to top, var(--pink), var(--purple));
            animation: wbA 0.7s ease-in-out infinite;
        }
        .wb:nth-child(1) {
            animation-delay: 0s;
            height: 6px;
        }
        .wb:nth-child(2) {
            animation-delay: 0.1s;
            height: 12px;
        }
        .wb:nth-child(3) {
            animation-delay: 0.2s;
            height: 20px;
        }
        .wb:nth-child(4) {
            animation-delay: 0.25s;
            height: 26px;
        }
        .wb:nth-child(5) {
            animation-delay: 0.2s;
            height: 20px;
        }
        .wb:nth-child(6) {
            animation-delay: 0.1s;
            height: 12px;
        }
        .wb:nth-child(7) {
            animation-delay: 0s;
            height: 6px;
        }
        @keyframes wbA {
            0%,
            100% {
                transform: scaleY(0.3);
            }
            50% {
                transform: scaleY(1);
            }
        }

        /* ── timer ── */
        .timer {
            font-size: 1rem;
            color: rgba(255, 228, 240, 0.5);
            display: none;
            margin-bottom: 0.4rem;
            font-family: 'Zen Maru Gothic', serif;
            letter-spacing: 2px;
        }
        .timer.on {
            display: block;
        }

        /* ── buttons ── */
        .btn-row {
            display: flex;
            gap: 0.8rem;
            align-items: center;
            margin-bottom: 0.3rem;
        }
        .cbtn {
            width: 68px;
            height: 68px;
            border-radius: 50%;
            border: none;
            font-size: 1.7rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.3s;
            position: relative;
            outline: none;
        }
        .cbtn:active {
            transform: scale(0.9);
        }
        .cbtn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn-go {
            background: linear-gradient(135deg, var(--pink), #e91e8c);
            box-shadow: 0 6px 30px rgba(255, 110, 180, 0.5);
            animation: cG 2.5s ease-in-out infinite;
        }
        @keyframes cG {
            0%,
            100% {
                box-shadow: 0 6px 30px rgba(255, 110, 180, 0.5);
            }
            50% {
                box-shadow: 0 6px 55px rgba(255, 110, 180, 0.85);
            }
        }
        .btn-go:hover:not(:disabled) {
            transform: scale(1.05);
        }

        .btn-stop {
            background: linear-gradient(135deg, #ef4444, #b91c1c);
            box-shadow: 0 6px 30px rgba(239, 68, 68, 0.35);
            display: none;
        }
        .btn-stop:hover {
            transform: scale(1.05);
        }

        .btn-mute {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255, 110, 180, 0.2);
            background: rgba(255, 110, 180, 0.06);
            color: var(--text);
            font-size: 1.1rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            backdrop-filter: blur(4px);
        }
        .btn-mute.on {
            display: flex;
        }
        .btn-mute:hover {
            background: rgba(255, 110, 180, 0.15);
            border-color: rgba(255, 110, 180, 0.4);
        }
        .btn-mute.muted {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .btn-lbl {
            font-size: 0.72rem;
            color: rgba(255, 228, 240, 0.3);
            text-align: center;
            letter-spacing: 0.5px;
            margin-top: 0.1rem;
            min-height: 1.4rem;
            transition: color 0.3s;
        }
        .btn-lbl.active {
            color: rgba(255, 228, 240, 0.6);
        }

        .err {
            background: rgba(239, 68, 68, 0.08);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 14px;
            padding: 0.5rem 1rem;
            font-size: 0.75rem;
            color: #fca5a5;
            text-align: center;
            max-width: 300px;
            display: none;
            margin-top: 0.5rem;
            backdrop-filter: blur(4px);
        }
        .err.show {
            display: block;
            animation: speechIn 0.3s ease-out;
        }

        /* ── personality panel ── */
        .personality-panel {
            width: 100%;
            margin-top: 0.8rem;
            padding: 0.6rem 0.8rem 0.4rem;
            border-top: 1px solid rgba(255, 110, 180, 0.06);
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.6rem;
            justify-content: center;
        }
        .p-trait {
            font-size: 0.6rem;
            font-weight: 300;
            color: rgba(255, 228, 240, 0.3);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 110, 180, 0.04);
            padding: 0.15rem 0.7rem;
            border-radius: 30px;
            letter-spacing: 0.3px;
            transition: all 0.3s;
        }
        .p-trait:hover {
            color: rgba(255, 228, 240, 0.6);
            border-color: rgba(255, 110, 180, 0.15);
            background: rgba(255, 110, 180, 0.04);
        }

        /* ── responsive ── */
        @media (max-width: 480px) {
            .container {
                border-radius: 32px 32px 24px 24px;
                padding: 0.4rem 0.4rem 1.2rem;
            }
            .stage {
                width: 280px;
                height: 350px;
            }
            .girl-svg {
                width: 260px;
                height: 340px;
            }
            .glow-circle {
                width: 220px;
                height: 220px;
                top: 50px;
                left: 30px;
            }
            .ring {
                width: 240px;
                height: 240px;
                top: 35px;
                left: 20px;
            }
            .name-tag {
                font-size: 1.9rem;
            }
            .cbtn {
                width: 58px;
                height: 58px;
                font-size: 1.4rem;
            }
            .btn-mute {
                width: 38px;
                height: 38px;
                font-size: 0.9rem;
            }
            .speech {
                font-size: 0.82rem;
                max-width: 260px;
                padding: 0.6rem 1rem;
            }
            .status-pill {
                font-size: 0.68rem;
                padding: 0.2rem 0.9rem;
            }
            .personality-panel {
                gap: 0.3rem 0.5rem;
            }
            .p-trait {
                font-size: 0.55rem;
                padding: 0.1rem 0.6rem;
            }
        }

        @media (max-width: 380px) {
            .stage {
                width: 240px;
                height: 300px;
            }
            .girl-svg {
                width: 220px;
                height: 290px;
            }
            .glow-circle {
                width: 180px;
                height: 180px;
                top: 40px;
                left: 30px;
            }
            .ring {
                width: 200px;
                height: 200px;
                top: 30px;
                left: 20px;
            }
            .name-tag {
                font-size: 1.5rem;
            }
        }

        /* ── loading shimmer ── */
        .shimmer {
            display: inline-block;
            background: linear-gradient(90deg, rgba(255, 110, 180, 0.1) 25%, rgba(255, 110, 180, 0.2) 50%, rgba(255, 110, 180, 0.1) 75%);
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: 8px;
        }
        @keyframes shimmer {
            0% {
                background-position: 200% 0;
            }
            100% {
                background-position: -200% 0;
            }
        }

        /* scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 110, 180, 0.2);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 110, 180, 0.4);
        }
    </style>
</head>
<body>

    <div class="bg-grad"></div>
    <div class="stars" id="stars"></div>

    <div class="container">

        <!-- header -->
        <div class="header">
            <div class="name-tag"><span>विविका</span> 💕</div>
            <div class="subtitle">Tumhari pyaari girlfriend Vivika</div>
            <div class="badge-row">
                <span class="badge">✨ 24/7</span>
                <span class="badge">💬 5+ languages</span>
                <span class="badge">🧠 emotional AI</span>
            </div>
        </div>

        <!-- stage -->
        <div class="stage">
            <div class="glow-circle"></div>
            <div class="ring"></div>
            <div id="hStage"></div>

            <!-- SVG -->
            <svg class="girl-svg" id="girlSvg" viewBox="0 0 300 390" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <radialGradient id="gSkin" cx="50%" cy="35%" r="65%">
                        <stop offset="0%" stop-color="#fff3ea"/>
                        <stop offset="100%" stop-color="#ffd5b8"/>
                    </radialGradient>
                    <radialGradient id="gHair" cx="50%" cy="0%" r="80%">
                        <stop offset="0%" stop-color="#f5f0ff"/>
                        <stop offset="60%" stop-color="#ddd5f5"/>
                        <stop offset="100%" stop-color="#c8bce8"/>
                    </radialGradient>
                    <radialGradient id="gEye" cx="35%" cy="30%" r="70%">

    <script>
        // ============================================================
        //  STARS
        // ============================================================
        (function initStars() {
            const container = document.getElementById('stars');
            if (!container) return;
            for (let i = 0; i < 70; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = 1 + Math.random() * 3;
                star.style.setProperty('--s', size + 'px');
                star.style.setProperty('--x', Math.random() * 100 + '%');
                star.style.setProperty('--y', Math.random() * 100 + '%');
                star.style.setProperty('--d', (2 + Math.random() * 4) + 's');
                star.style.animationDelay = (Math.random() * 5) + 's';
                container.appendChild(star);
            }
        })();

        // ============================================================
        //  EMOTION ENGINE
        // ============================================================
        function setEmo(e) {
            const bL = document.getElementById('blushL'),
                bR = document.getElementById('blushR');
            const tL = document.getElementById('tearL'),
                tR = document.getElementById('tearR');
            const ag = document.getElementById('angerG');
            const browL = document.getElementById('browL'),
                browR = document.getElementById('browR');
            const ms = document.getElementById('mSmile');
            const hr = document.getElementById('handR');
            const svg = document.getElementById('girlSvg');

            [bL, bR, tL, tR, ag].forEach(x => { if (x) x.classList.remove('show'); });
            if (hr) hr.classList.remove('waving');
            if (svg) svg.classList.remove('active');

            // reset brows
            if (browL) browL.setAttribute('d', 'M96 152 Q110 146 124 149');
            if (browR) browR.setAttribute('d', 'M176 149 Q190 146 204 152');
            if (ms) ms.setAttribute('d', 'M132 218 Q150 232 168 218');

            if (e === 'happy') {
                if (bL) bL.classList.add('show');
                if (bR) bR.classList.add('show');
                if (hr) hr.classList.add('waving');
                if (svg) svg.classList.add('active');
                spawnHearts();
            } else if (e === 'shy') {
                if (bL) bL.classList.add('show');
                if (bR) bR.classList.add('show');
                if (svg) svg.classList.add('active');
            } else if (e === 'sad') {
                if (tL) tL.classList.add('show');
                if (tR) tR.classList.add('show');
                if (browL) browL.setAttribute('d', 'M92 150 Q107 157 122 153');
                if (browR) browR.setAttribute('d', 'M178 153 Q193 157 208 150');
                if (ms) ms.setAttribute('d', 'M130 228 Q150 218 170 228');
            } else if (e === 'angry') {
                if (ag) ag.classList.add('show');
                if (bL) bL.classList.add('show');
                if (bR) bR.classList.add('show');
            } else if (e === 'talking') {
                if (bL) bL.classList.add('show');
                if (bR) bR.classList.add('show');
                if (svg) svg.classList.add('active');
            }
        }

        // ============================================================
        //  LIP SYNC
        // ============================================================
        let lipI = null;

        function startLip() {
            const mo = document.getElementById('mOpen');
            const mi = document.getElementById('mInner');
            const ms = document.getElementById('mSmile');
            const mt = document.getElementById('mTeeth');
            if (ms) ms.style.opacity = '0';
            [mo, mi, mt].forEach(el => { if (el) el.style.opacity = '1'; });
            if (lipI) clearInterval(lipI);
            lipI = setInterval(() => {
                const ry = 2 + Math.random() * 7,
                    rx = 10 + Math.random() * 5;
                if (mo) { mo.setAttribute('ry', ry);
                    mo.setAttribute('rx', rx); }
                if (mi) { mi.setAttribute('ry', ry * 0.6);
                    mi.setAttribute('rx', rx * 0.65); }
            }, 90);
        }

        function stopLip() {
            clearInterval(lipI);
            lipI = null;
            ['mOpen', 'mInner', 'mTeeth'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.style.opacity = '0';
            });
            const ms = document.getElementById('mSmile');
            if (ms) ms.style.opacity = '1';
        }

        // ============================================================
        //  HEARTS
        // ============================================================
        function spawnHearts() {
            const c = document.getElementById('hStage');
            if (!c) return;
            const em = ['💕', '💗', '💖', '💝', '❤️', '✨', '🌸'];
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    const h = document.createElement('div');
                    h.className = 'heart-fly';
                    h.textContent = em[Math.floor(Math.random() * em.length)];
                    h.style.left = (15 + Math.random() * 70) + '%';
                    h.style.bottom = (15 + Math.random() * 35) + '%';
                    h.style.animationDuration = (1.4 + Math.random() * 0.8) + 's';
                    c.appendChild(h);
                    setTimeout(() => h.remove(), 2500);
                }, i * 150);
            }
        }

        // ============================================================
        //  SPEECH BUBBLE
        // ============================================================
        let speechTimeout = null;

        function showSpeech(txt, emo, duration) {
            const b = document.getElementById('speech');
            if (!b) return;
            clearTimeout(speechTimeout);
            b.textContent = txt;
            b.classList.add('on');
            if (emo) setEmo(emo);
            const dur = duration || 4500;
            speechTimeout = setTimeout(() => {
                b.classList.remove('on');
            }, dur);
        }

        // ============================================================
        //  UI STATE
        // ============================================================
        let timerInt = null,
            secs = 0;

        function showUI(on) {
            const btnGo = document.getElementById('btnGo');
            const btnStop = document.getElementById('btnStop');
            const bm = document.getElementById('btnMute');
            const wb = document.getElementById('wBars');
            const tm = document.getElementById('timer');
            const st = document.getElementById('sTxt');
            const bl = document.getElementById('bLbl');
            const sp = document.getElementById('statusPill');
            const sd = document.getElementById('sDot');

            if (btnGo) btnGo.style.display = on ? 'none' : 'flex';
            if (btnGo && !on) btnGo.disabled = false;
            if (btnStop) btnStop.style.display = on ? 'flex' : 'none';
            if (bm) bm.classList.toggle('on', on);
            if (wb) wb.classList.toggle('on', on);
            if (tm) tm.classList.toggle('on', on);
            if (st) st.textContent = on ? 'Baat ho rahi hai 💕' : 'Online — Tumhara intezaar kar rahi hoon 💕';
            if (bl) bl.textContent = on ? 'Band karne ke liye 📵 dabao' : 'Call karke Vivika se baat karo 💬';
            if (bl) bl.classList.toggle('active', on);
            if (sp) sp.classList.toggle('active', on);
            if (sd) sd.classList.toggle('inactive', !on);

            if (on) {
                secs = 0;
                clearInterval(timerInt);
                timerInt = setInterval(() => {
                    secs++;
                    const m = String(Math.floor(secs / 60)).padStart(2, '0');
                    const s = String(secs % 60).padStart(2, '0');
                    if (tm) tm.textContent = m + ':' + s;
                }, 1000);
            } else {
                clearInterval(timerInt);
                timerInt = null;
                if (tm) tm.textContent = '00:00';
                stopLip();
                const spb = document.getElementById('speech');
                if (spb) spb.classList.remove('on');
                clearTimeout(speechTimeout);
                const eb = document.getElementById('errBox');
                if (eb) eb.classList.remove('show');
            }
        }

        function showErr(m) {
            const b = document.getElementById('errBox');
            if (b) { b.textContent = m;
                b.classList.add('show'); }
        }

        // ============================================================
        //  IDLE EMOTIONS
        // ============================================================
        let idleInterval = null;

        function startIdleEmotions() {
            if (idleInterval) return;
            idleInterval = setInterval(() => {
                // Only if not in a call
                if (!isActive) {
                    const r = Math.random();
                    if (r > 0.6) {
                        setEmo('happy');
                        setTimeout(() => setEmo('shy'), 2800);
                    } else if (r > 0.3) {
                        setEmo('shy');
                        setTimeout(() => setEmo('happy'), 2500);
                    }
                }
            }, 7000);
        }

        // ============================================================
        //  VAPI SDK
        // ============================================================
        var vapiInstance = null;
        var isActive = false;
        var isMuted = false;

        (function(d, t) {
            var g = d.createElement(t),
                s = d.getElementsByTagName(t)[0];
            g.src = "https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js";
            g.defer = true;
            g.async = true;
            s.parentNode.insertBefore(g, s);
            g.onload = function() {
                try {
                    vapiInstance = window.vapiSDK.run({
                        apiKey: "59175345-fc44-4e26-9283-ebd200a361dd",
                        assistant: "69f3ab1d-62e4-4da6-9f4d-e7c5447a5fbb",
                        config: {
                            position: "bottom-right",
                            offset: "40px",
                            width: "1px",
                            height: "1px",
                            idle: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" },
                            loading: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" },
                            active: { color: "transparent", type: "pill", title: "", subtitle: "", icon: "" }
                        }
                    });

                    vapiInstance.on('call-start', function() {
                        isActive = true;
                        showUI(true);
                        setEmo('shy');
                        showSpeech('Arre aagaye tum! Kitna intezaar kiya... 🥺', 'shy', 4000);
                    });

                    vapiInstance.on('speech-start', function() {
                        startLip();
                        setEmo('talking');
                    });

                    vapiInstance.on('speech-end', function() {
                        stopLip();
                        setEmo('happy');
                    });

                    vapiInstance.on('call-end', function() {
                        isActive = false;
                        stopLip();
                        showUI(false);
                        setEmo('sad');
                        showSpeech('Jaana tha toh... jaldi aana phir 🥺', 'sad', 4500);
                        setTimeout(() => { if (!isActive) setEmo('happy'); }, 5500);
                    });

                    vapiInstance.on('error', function(e) {
                        showErr('Error: ' + (e.message || 'dobara try karo'));
                        showUI(false);
                        stopLip();
                        isActive = false;
                    });

                    console.log('Vivika: Vapi loaded successfully!');
                    startIdleEmotions();

                } catch (err) {
                    showErr('Vapi initialization failed. Refresh karo.');
                    console.error(err);
                }
            };
            g.onerror = function() {
                showErr('Internet check karo aur reload karo.');
            };
        })(document, "script");

        // ============================================================
        //  CALL CONTROLS
        // ============================================================
        function startCall() {
            if (!vapiInstance) {
                showErr('Loading... thodi der baad try karo');
                return;
            }
            const btnGo = document.getElementById('btnGo');
            if (btnGo) btnGo.disabled = true;
            const st = document.getElementById('sTxt');
            if (st) st.textContent = 'Connect ho rahi hoon...';
            setEmo('shy');
            try {
                vapiInstance.start("69f3ab1d-62e4-4da6-9f4d-e7c5447a5fbb");
            } catch (e) {
                showErr('Call start nahi ho paaya: ' + (e.message || ''));
                if (btnGo) btnGo.disabled = false;
                if (st) st.textContent = 'Online — Tumhara intezaar kar rahi hoon 💕';
            }
        }

        function endCall() {
            if (vapiInstance && isActive) {
                try {
                    vapiInstance.stop();
                } catch (e) {
                    console.warn('Stop error:', e);
                }
            }
            isActive = false;
            showUI(false);
            stopLip();
            const st = document.getElementById('sTxt');
            if (st) st.textContent = 'Online — Tumhara intezaar kar rahi hoon 💕';
            const btnGo = document.getElementById('btnGo');
            if (btnGo) btnGo.disabled = false;
        }

        function toggleMute() {
            if (!vapiInstance || !isActive) return;
            isMuted = !isMuted;
            try {
                vapiInstance.setMuted(isMuted);
            } catch (e) {
                console.warn('Mute toggle error:', e);
            }
            const b = document.getElementById('btnMute');
            if (b) {
                b.textContent = isMuted ? '🔇' : '🎤';
                b.classList.toggle('muted', isMuted);
            }
        }

        // ============================================================
        //  KEYBOARD SHORTCUTS
        // ============================================================
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
                const go = document.getElementById('btnGo');
                if (go && go.style.display !== 'none' && !go.disabled) {
                    e.preventDefault();
                    startCall();
                    return;
                }
                const stop = document.getElementById('btnStop');
                if (stop && stop.style.display !== 'none') {
                    e.preventDefault();
                    endCall();
                    return;
                }
            }
            if (e.key === 'm' || e.key === 'M') {
                toggleMute();
            }
            if (e.key === 'Escape') {
                endCall();
            }
        });

        // ============================================================
        //  INIT
        // ============================================================
        // Set initial happy state after load
        setTimeout(() => {
            setEmo('happy');
        }, 600);

        console.log('🌸 Vivika — Tumhari pyaari AI girlfriend ready hai!');
        console.log('💡 Press Enter to call, Esc to end, M to mute.');
    </script>

</body>
