<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bibek Books | Buy & Read</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #f8f5f0;
            --card-bg: #ffffff;
            --text: #1c1a17;
            --text-secondary: #6b6057;
            --accent: #2e6b50;
            --accent-light: #e6f0eb;
            --gold: #b8823a;
            --gold-light: #fdf3e0;
            --danger: #c0392b;
            --border: #e5ddd5;
            --shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
            --shadow: 0 6px 24px rgba(0,0,0,0.09);
            --shadow-lg: 0 16px 48px rgba(0,0,0,0.14);
            --radius: 16px;
            --radius-sm: 10px;
            --transition: 0.22s cubic-bezier(0.4,0,0.2,1);
            --navbar-h: 68px;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'DM Sans', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .navbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(248,245,240,0.93);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--border);
            height: var(--navbar-h);
            display: flex; align-items: center;
            padding: 0 28px; gap: 18px;
        }
        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.55rem; font-weight: 800;
            color: var(--accent);
            letter-spacing: -0.5px;
            white-space: nowrap;
            display: flex; align-items: center; gap: 10px;
            text-decoration: none;
        }
        .logo-icon {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, var(--accent), var(--gold));
            border-radius: 9px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 1.1rem; flex-shrink: 0;
        }
        .search-wrap {
            flex: 1; max-width: 460px; position: relative; margin: 0 auto;
        }
        .search-wrap input {
            width: 100%; padding: 10px 18px 10px 44px;
            border: 2px solid var(--border); border-radius: 50px;
            font-size: 0.92rem; font-family: inherit;
            background: var(--card-bg); color: var(--text);
            outline: none; transition: var(--transition);
        }
        .search-wrap input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-light);
        }
        .search-wrap .s-icon {
            position: absolute; left: 15px; top: 50%;
            transform: translateY(-50%); color: #aaa;
            pointer-events: none; font-size: 1rem;
        }
        .nav-actions { display: flex; gap: 8px; align-items: center; }
        .btn-icon {
            width: 42px; height: 42px; border-radius: 50%;
            border: none; background: transparent; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; transition: var(--transition);
            position: relative; color: var(--text-secondary);
        }
        .btn-icon:hover { background: #ede8e2; color: var(--text); }
        .btn-icon.active-author { background: var(--gold-light); color: var(--gold); }
        .badge-dot {
            position: absolute; top: 7px; right: 7px;
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); border: 2px solid var(--bg);
            display: none;
        }
        .main-wrap { max-width: 1300px; margin: 0 auto; padding: 32px 28px 80px; }
        .hero {
            text-align: center; padding: 36px 20px 28px;
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.6rem; font-weight: 800;
            color: var(--text); letter-spacing: -0.8px;
            margin-bottom: 10px;
        }
        .hero p { color: var(--text-secondary); font-size: 1.05rem; max-width: 480px; margin: 0 auto; }
        .author-panel {
            background: var(--card-bg);
            border: 2px solid var(--gold-light);
            border-radius: var(--radius);
            padding: 28px; margin-bottom: 30px;
            display: none; box-shadow: var(--shadow);
            animation: slideUp 0.3s ease;
        }
        .author-panel.visible { display: block; }
        .author-panel-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.25rem; color: var(--gold);
            margin-bottom: 20px; display: flex; align-items: center; gap: 8px;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .form-grid .full-w { grid-column: 1 / -1; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-weight: 600; font-size: 0.82rem; color: var(--text-secondary); }
        .form-group input, .form-group textarea, .form-group select {
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); font-family: inherit;
            font-size: 0.9rem; background: #fff;
            color: var(--text); transition: var(--transition); resize: vertical;
        }
        .form-group input:focus, .form-group textarea:focus, .form-group select:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-light);
        }
        .checkbox-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 14px; border: 2px solid var(--border);
            border-radius: var(--radius-sm); background: #fff;
        }
        .checkbox-row input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; }
        .checkbox-row label { margin: 0; font-weight: 500; font-size: 0.88rem; cursor: pointer; color: var(--text); }
        .panel-actions { display: flex; gap: 12px; margin: 20px 0 16px; flex-wrap: wrap; }
        .manage-list { max-height: 280px; overflow-y: auto; margin-top: 12px; }
        .manage-item {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--bg); border-radius: 50px;
            padding: 8px 16px; margin-bottom: 8px;
            border: 1px solid var(--border); gap: 10px;
            transition: var(--transition);
        }
        .manage-item:hover { border-color: #ccc; }
        .manage-item-info { flex: 1; min-width: 0; }
        .manage-item-title { font-weight: 600; font-size: 0.88rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .manage-item-meta { font-size: 0.75rem; color: #999; }
        .copyright-section { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
        .section-header {
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
            gap: 14px; margin-bottom: 20px;
        }
        .section-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem; font-weight: 700; color: var(--text);
        }
        .category-pills { display: flex; gap: 8px; flex-wrap: wrap; }
        .pill {
            padding: 7px 18px; border-radius: 50px;
            border: 2px solid var(--border); background: var(--card-bg);
            cursor: pointer; font-size: 0.84rem; font-family: inherit;
            transition: var(--transition); color: var(--text-secondary);
            font-weight: 500; white-space: nowrap;
        }
        .pill:hover { border-color: #bbb; color: var(--text); }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 22px;
        }
        .book-card {
            background: var(--card-bg); border-radius: var(--radius);
            overflow: hidden; border: 1px solid var(--border);
            transition: var(--transition); cursor: pointer;
            position: relative; display: flex; flex-direction: column;
            box-shadow: var(--shadow-sm);
        }
        .book-card:hover { transform: translateY(-6px); box-shadow: var(--shadow-lg); border-color: #d0c8be; }
        .book-cover {
            width: 100%; aspect-ratio: 2/2.9;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Playfair Display', serif;
            font-size: 1rem; font-weight: 700; color: #fff;
            text-align: center; padding: 18px;
            letter-spacing: 0.3px; position: relative; overflow: hidden;
        }
        .book-cover img {
            width: 100%; height: 100%; object-fit: cover;
            position: absolute; top: 0; left: 0;
        }
        .cover-text { position: relative; z-index: 1; text-shadow: 0 2px 8px rgba(0,0,0,0.35); line-height: 1.3; }
        .read-badge {
            position: absolute; top: 10px; right: 10px;
            background: rgba(0,0,0,0.65); color: #fff;
            padding: 4px 10px; border-radius: 50px;
            font-size: 0.68rem; font-weight: 700; letter-spacing: 1px;
            z-index: 2; opacity: 0; transform: translateY(-4px);
            transition: var(--transition); pointer-events: none;
        }
        .book-card:hover .read-badge { opacity: 1; transform: translateY(0); }
        .book-info { padding: 14px 14px 16px; flex: 1; display: flex; flex-direction: column; gap: 4px; }
        .book-title {
            font-weight: 700; font-size: 0.95rem; line-height: 1.3;
            display: -webkit-box; -webkit-line-clamp: 2;
            -webkit-box-orient: vertical; overflow: hidden; color: var(--text);
        }
        .book-author { font-size: 0.78rem; color: var(--text-secondary); }
        .book-meta { font-size: 0.72rem; color: #aaa; }
        .price-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
        .price-cur { font-weight: 800; font-size: 1.05rem; color: var(--accent); }
        .price-old { font-size: 0.75rem; text-decoration: line-through; color: #aaa; }
        .badge-disc { background: #e57e4a; color: #fff; font-size: 0.68rem; padding: 2px 7px; border-radius: 50px; font-weight: 700; }
        .badge-free { background: var(--accent); color: #fff; font-size: 0.7rem; padding: 3px 10px; border-radius: 50px; font-weight: 700; }
        .card-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
        .act-btn {
            flex: 1; background: var(--bg); border: 1px solid var(--border);
            padding: 7px 8px; border-radius: 50px;
            font-size: 0.72rem; font-weight: 500;
            display: inline-flex; align-items: center; justify-content: center; gap: 4px;
            cursor: pointer; transition: var(--transition); font-family: inherit;
            text-decoration: none; color: var(--text);
        }
        .act-btn:hover { background: #e8e2db; }
        .act-btn.saved { color: #c0392b; }
        .btn-buy { background: #f0c674; color: #2c3e2f; border-color: #dba53f; }
        .btn-buy:hover { background: #e5b65a; }
        .empty-state { text-align: center; padding: 60px 20px; grid-column: 1 / -1; color: var(--text-secondary); }
        .modal-overlay {
            position: fixed; inset: 0; z-index: 200;
            background: rgba(0,0,0,0.72);
            display: flex; align-items: center; justify-content: center;
            padding: 20px; animation: fadeIn 0.2s ease;
        }
        .modal {
            background: #fff; border-radius: var(--radius);
            width: 100%; max-width: 880px;
            max-height: 90vh; display: flex; flex-direction: column;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease; overflow: hidden;
        }
        .modal-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px 22px; border-bottom: 1px solid var(--border); gap: 12px;
        }
        .modal-header h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem; font-weight: 700;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .modal-close {
            width: 36px; height: 36px; border-radius: 50%;
            border: none; background: #f0ece7; cursor: pointer;
            font-size: 1.1rem; display: flex; align-items: center;
            justify-content: center; transition: var(--transition); flex-shrink: 0;
        }
        .modal-close:hover { background: #e0dbd4; }
        .modal-body { flex: 1; overflow: auto; min-height: 380px; background: #f7f5f2; }
        .modal-body iframe { width: 100%; height: 65vh; border: none; display: block; }
        .modal-footer {
            padding: 14px 22px; border-top: 1px solid var(--border);
            display: flex; gap: 10px; justify-content: flex-end; flex-wrap: wrap;
        }
        .edit-modal-card, .buy-options-card {
            background: #fff; border-radius: 24px;
            max-width: 560px; width: 90%; max-height: 85vh;
            overflow-y: auto; padding: 28px;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease;
        }
        .buy-options-card { max-width: 480px; }
        .wishlist-card {
            background: #fff; border-radius: 24px;
            max-width: 500px; width: 90%; max-height: 80vh;
            overflow-y: auto; padding: 28px;
            box-shadow: var(--shadow-lg); animation: slideUp 0.3s ease;
        }
        .buy-store-btn {
            display: flex; align-items: center; gap: 12px;
            background: #f8f5f0; border-radius: 60px;
            padding: 12px 20px; margin-bottom: 12px;
            text-decoration: none; color: var(--text);
            font-weight: 600; border: 1px solid var(--border);
            transition: var(--transition);
        }
        .buy-store-btn:hover { background: var(--accent-light); border-color: var(--accent); transform: translateX(4px); }
        .buy-store-icon { font-size: 1.7rem; }
        .btn { padding: 9px 22px; border-radius: 50px; border: none; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.88rem; transition: var(--transition); display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: #235741; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(46,107,80,0.3); }
        .btn-outline { background: #fff; color: var(--accent); border: 2px solid var(--accent); }
        .btn-outline:hover { background: var(--accent-light); }
        .btn-danger { background: var(--danger); color: #fff; }
        .btn-danger:hover { background: #a93226; }
        .btn-sm { padding: 6px 15px; font-size: 0.8rem; }
        .toast-container {
            position: fixed; bottom: 24px; left: 24px; z-index: 999;
            display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            padding: 12px 20px; border-radius: 50px; color: #fff;
            font-weight: 500; font-size: 0.88rem;
            animation: slideInLeft 0.3s ease, fadeOut 0.3s ease 2.7s forwards;
            box-shadow: var(--shadow); max-width: 360px;
        }
        .toast.success { background: #2e7d52; }
        .toast.error   { background: #c0392b; }
        .toast.info    { background: #2171a8; }
        .site-footer {
            background: #f0ece5; border-top: 1px solid var(--border);
            padding: 28px 24px; text-align: center;
            font-size: 0.72rem; color: var(--text-secondary);
            white-space: pre-line; margin-top: 60px;
        }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes slideUp { from { transform:translateY(28px); opacity:0; } to { transform:translateY(0); opacity:1; } }
        @keyframes slideInLeft { from { transform:translateX(-110%); opacity:0; } to { transform:translateX(0); opacity:1; } }
        @keyframes fadeOut { to { opacity:0; transform:translateY(6px); } }
        @media (max-width: 768px) {
            .navbar { padding: 0 14px; gap: 10px; }
            .logo { font-size: 1.3rem; }
            .hero h1 { font-size: 2rem; }
            .form-grid { grid-template-columns: 1fr; }
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
            .main-wrap { padding: 20px 16px 60px; }
            .card-actions .act-btn { font-size: 0.68rem; padding: 5px 6px; }
        }
    </style>
</head>
<body>
<div class="toast-container" id="toastContainer"></div>
<nav class="navbar">
    <a class="logo" href="#"><div class="logo-icon">📚</div>Bibek Books</a>
    <div class="search-wrap">
        <span class="s-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Search books..." oninput="filterBooks()">
    </div>
    <div class="nav-actions">
        <button class="btn-icon" id="wishlistBtn" onclick="openWishlistModal()" title="Wishlist">❤️ <span class="badge-dot" id="wishDot"></span></button>
        <button class="btn-icon" id="authorToggleBtn" onclick="toggleAuthorPanel()" title="Author Studio">✍️</button>
    </div>
</nav>

<div class="main-wrap">
    <div class="hero">
        <h1>📖 Bibek Books</h1>
        <p>Read, wishlist, or buy from your favourite stores — Amazon, Flipkart & more.</p>
    </div>

    <!-- Author Panel -->
    <div class="author-panel" id="authorPanel">
        <div class="author-panel-title">✍️ Author Studio</div>
        <div id="authorPanelContent"></div>
    </div>

    <div class="section-header">
        <h2 id="sectionTitle">All Books</h2>
        <div class="category-pills" id="categoryPills"></div>
    </div>
    <div class="book-grid" id="bookGrid"></div>
</div>

<div class="site-footer" id="siteFooter">
    © 2024 Bibek Books · All rights reserved
    Designed with ❤️ for book lovers
</div>

<!-- Read Modal -->
<div class="modal-overlay" id="readModal" style="display:none" onclick="if(event.target===this)closeReadModal()">
    <div class="modal">
        <div class="modal-header">
            <h3 id="readModalTitle"></h3>
            <button class="modal-close" onclick="closeReadModal()">✕</button>
        </div>
        <div class="modal-body" id="readModalBody"></div>
        <div class="modal-footer" id="readModalFooter"></div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="editModal" style="display:none" onclick="if(event.target===this)closeEditModal()">
    <div class="edit-modal-card">
        <h3 style="font-family:'Playfair Display',serif;margin-bottom:20px;">✏️ Edit Book</h3>
        <input type="hidden" id="editBookId">
        <div style="display:flex;flex-direction:column;gap:12px;">
            <div class="form-group"><label>Title</label><input id="eTitle" placeholder="Book title"></div>
            <div class="form-group"><label>Author</label><input id="eAuthor" placeholder="Author name"></div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div class="form-group"><label>Publish Date</label><input type="date" id="eDate"></div>
                <div class="form-group"><label>Category</label>
                    <select id="eCat">
                        <option>Spiritual</option><option>Fiction</option><option>Non-Fiction</option>
                        <option>Science</option><option>History</option><option>Poetry</option><option>Business</option>
                    </select>
                </div>
                <div class="form-group"><label>Price (₹)</label><input type="number" id="ePrice" placeholder="0"></div>
                <div class="form-group"><label>Discount (%)</label><input type="number" id="eDisc" min="0" max="90" placeholder="0"></div>
            </div>
            <div class="checkbox-row"><input type="checkbox" id="eFree"><label for="eFree">📖 Make FREE to Read</label></div>
            <div class="form-group"><label>Amazon Link</label><input id="eAmazon" placeholder="https://www.amazon.in/dp/..."></div>
            <div class="form-group"><label>Flipkart Link</label><input id="eFlipkart" placeholder="https://www.flipkart.com/..."></div>
            <div class="form-group"><label>Cover Image URL</label><input id="eCoverUrl" placeholder="https://example.com/cover.jpg"></div>
            <div class="form-group"><label>Read/PDF URL</label><input id="eReadUrl" placeholder="https://example.com/book.pdf"></div>
            <div class="form-group"><label>Description</label><textarea id="eDesc" rows="3" placeholder="Short description..."></textarea></div>
        </div>
        <div style="display:flex;gap:10px;margin-top:20px;justify-content:flex-end;flex-wrap:wrap;">
            <button class="btn btn-outline" onclick="closeEditModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveEditBook()">💾 Save Changes</button>
        </div>
    </div>
</div>

<!-- Buy Options Modal -->
<div class="modal-overlay" id="buyModal" style="display:none" onclick="if(event.target===this)closeBuyModal()">
    <div class="buy-options-card">
        <h3 style="font-family:'Playfair Display',serif;margin-bottom:6px;">🛒 Buy This Book</h3>
        <p style="color:var(--text-secondary);font-size:0.85rem;margin-bottom:20px;" id="buyModalSubtitle"></p>
        <div id="buyModalLinks"></div>
        <button class="btn btn-outline" style="width:100%;margin-top:8px;justify-content:center;" onclick="closeBuyModal()">Close</button>
    </div>
</div>

<!-- Wishlist Modal -->
<div class="modal-overlay" id="wishlistModal" style="display:none" onclick="if(event.target===this)closeWishlistModal()">
    <div class="wishlist-card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
            <h3 style="font-family:'Playfair Display',serif;">❤️ My Wishlist</h3>
            <button class="modal-close" onclick="closeWishlistModal()">✕</button>
        </div>
        <div id="wishlistContent"></div>
    </div>
</div>

<script>
// ─── DATA STORE ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'bibekBooks_v1';
const WISH_KEY    = 'bibekWishlist_v1';

const COVER_PALETTES = [
    'linear-gradient(135deg,#2e6b50,#4a9e76)',
    'linear-gradient(135deg,#b8823a,#e8a84e)',
    'linear-gradient(135deg,#3a5a8c,#5a82c0)',
    'linear-gradient(135deg,#7c3a7c,#b05ab0)',
    'linear-gradient(135deg,#8c3a3a,#c05a5a)',
    'linear-gradient(135deg,#3a7c6b,#5ab09e)',
    'linear-gradient(135deg,#5a5a3a,#8c8c5a)',
    'linear-gradient(135deg,#1c3a5a,#2e6b9e)',
];

const DEFAULT_BOOKS = [
    {
        id: 'book1', title: 'The Bhagavad Gita', author: 'Bibek Debroy', category: 'Spiritual',
        date: '2019-01-01', price: 299, discount: 20, free: false,
        amazon: 'https://www.amazon.in/s?k=Bhagavad+Gita+Bibek+Debroy',
        flipkart: 'https://www.flipkart.com/search?q=Bhagavad+Gita+Bibek+Debroy',
        coverUrl: '', readUrl: '', desc: 'A masterful translation of the sacred Gita with scholarly annotations.',
        palette: 0
    },
    {
        id: 'book2', title: 'The Mahabharata (Vol. 1)', author: 'Bibek Debroy', category: 'Spiritual',
        date: '2015-06-15', price: 499, discount: 15, free: false,
        amazon: 'https://www.amazon.in/s?k=Mahabharata+Bibek+Debroy',
        flipkart: 'https://www.flipkart.com/search?q=Mahabharata+Bibek+Debroy',
        coverUrl: '', readUrl: '', desc: 'The complete unabridged translation of the epic Mahabharata.',
        palette: 1
    },
    {
        id: 'book3', title: 'Sarama and Her Children', author: 'Bibek Debroy', category: 'Non-Fiction',
        date: '2008-03-10', price: 350, discount: 0, free: false,
        amazon: 'https://www.amazon.in/s?k=Sarama+Children+Bibek+Debroy',
        flipkart: 'https://www.flipkart.com/search?q=Sarama+Children+Bibek+Debroy',
        coverUrl: '', readUrl: '', desc: 'The story of the dog in Indian mythology and culture.',
        palette: 2
    },
    {
        id: 'book4', title: 'Harishchandra', author: 'Bibek Debroy', category: 'History',
        date: '2021-08-20', price: 399, discount: 10, free: false,
        amazon: 'https://www.amazon.in/s?k=Harishchandra+Bibek+Debroy',
        flipkart: 'https://www.flipkart.com/search?q=Harishchandra+Bibek+Debroy',
        coverUrl: '', readUrl: '', desc: 'The legendary king of truth retold in Debroy\'s eloquent prose.',
        palette: 3
    },
    {
        id: 'book5', title: 'The Valmiki Ramayana', author: 'Bibek Debroy', category: 'Spiritual',
        date: '2017-09-01', price: 599, discount: 25, free: false,
        amazon: 'https://www.amazon.in/s?k=Valmiki+Ramayana+Bibek+Debroy',
        flipkart: 'https://www.flipkart.com/search?q=Valmiki+Ramayana+Bibek+Debroy',
        coverUrl: '', readUrl: '', desc: 'Unabridged translation of the original Ramayana by Valmiki.',
        palette: 4
    },
    {
        id: 'book6', title: 'Indra: A Life', author: 'Bibek Debroy', category: 'Spiritual',
        date: '2020-11-05', price: 450, discount: 0, free: true,
        amazon: 'https://www.amazon.in/s?k=Indra+A+Life+Bibek+Debroy',
        flipkart: '',
        coverUrl: '', readUrl: 'https://archive.org/embed/indra-a-life', desc: 'The fascinating story of the king of the gods from Vedic literature.',
        palette: 5
    },
];

let books = [];
let wishlist = [];
let activeCategory = 'All';
let authorPanelOpen = false;
let currentAddForm = null;

// ─── INIT ─────────────────────────────────────────────────────────────────────
function init() {
    const saved = localStorage.getItem(STORAGE_KEY);
    books = saved ? JSON.parse(saved) : JSON.parse(JSON.stringify(DEFAULT_BOOKS));
    const savedWish = localStorage.getItem(WISH_KEY);
    wishlist = savedWish ? JSON.parse(savedWish) : [];
    updateWishDot();
    buildCategoryPills();
    renderBooks();
    renderAuthorPanel();
}

function saveBooks() { localStorage.setItem(STORAGE_KEY, JSON.stringify(books)); }
function saveWishlist() { localStorage.setItem(WISH_KEY, JSON.stringify(wishlist)); }

// ─── CATEGORIES ───────────────────────────────────────────────────────────────
function getCategories() {
    const cats = ['All', ...new Set(books.map(b => b.category))].filter(Boolean);
    return cats;
}

function buildCategoryPills() {
    const pills = document.getElementById('categoryPills');
    pills.innerHTML = getCategories().map(c =>
        `<button class="pill${c===activeCategory?' active':''}" onclick="setCategory('${c}')">${c}</button>`
    ).join('');
}

function setCategory(cat) {
    activeCategory = cat;
    document.getElementById('sectionTitle').textContent = cat === 'All' ? 'All Books' : cat;
    buildCategoryPills();
    renderBooks();
}

// ─── RENDER BOOKS ─────────────────────────────────────────────────────────────
function getDiscountedPrice(price, disc) {
    return Math.round(price * (1 - disc / 100));
}

function renderBooks() {
    const grid = document.getElementById('bookGrid');
    const q = document.getElementById('searchInput').value.toLowerCase().trim();
    let filtered = books.filter(b => {
        const matchCat = activeCategory === 'All' || b.category === activeCategory;
        const matchQ = !q || b.title.toLowerCase().includes(q) || b.author.toLowerCase().includes(q);
        return matchCat && matchQ;
    });

    if (!filtered.length) {
        grid.innerHTML = `<div class="empty-state">📭 No books found.<br><small>Try a different search or category.</small></div>`;
        return;
    }

    grid.innerHTML = filtered.map(b => {
        const pal = COVER_PALETTES[b.palette % COVER_PALETTES.length];
        const finalPrice = getDiscountedPrice(b.price, b.discount || 0);
        const inWish = wishlist.includes(b.id);
        const coverHtml = b.coverUrl
            ? `<img src="${escHtml(b.coverUrl)}" alt="${escHtml(b.title)}" onerror="this.style.display='none'">`
            : '';
        return `
        <div class="book-card" onclick="openReadModal('${b.id}')">
            <div class="book-cover" style="background:${pal}">
                ${coverHtml}
                <span class="cover-text">${escHtml(b.title)}</span>
                <span class="read-badge">${b.free ? '📖 READ FREE' : '👁 PREVIEW'}</span>
            </div>
            <div class="book-info">
                <div class="book-title">${escHtml(b.title)}</div>
                <div class="book-author">by ${escHtml(b.author)}</div>
                <div class="book-meta">${b.category}${b.date ? ' · ' + b.date.slice(0,4) : ''}</div>
                <div class="price-row">
                    ${b.free
                        ? `<span class="badge-free">FREE</span>`
                        : `<span class="price-cur">₹${finalPrice}</span>
                           ${b.discount ? `<span class="price-old">₹${b.price}</span><span class="badge-disc">${b.discount}% OFF</span>` : ''}`
                    }
                </div>
                <div class="card-actions" onclick="event.stopPropagation()">
                    ${b.free || b.readUrl
                        ? `<button class="act-btn" onclick="openReadModal('${b.id}')">📖 Read</button>`
                        : ''}
                    <button class="act-btn btn-buy" onclick="openBuyModal('${b.id}')">🛒 Buy</button>
                    <button class="act-btn${inWish?' saved':''}" onclick="toggleWishlist('${b.id}',this)">
                        ${inWish?'❤️':'🤍'}
                    </button>
                    ${authorPanelOpen ? `<button class="act-btn" style="color:var(--gold)" onclick="openEditModal('${b.id}')">✏️</button>` : ''}
                </div>
            </div>
        </div>`;
    }).join('');
}

function filterBooks() { renderBooks(); }

// ─── READ MODAL ───────────────────────────────────────────────────────────────
function openReadModal(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('readModalTitle').textContent = b.title;
    const body = document.getElementById('readModalBody');
    if (b.readUrl) {
        body.innerHTML = `<iframe src="${escHtml(b.readUrl)}" allowfullscreen></iframe>`;
    } else {
        const pal = COVER_PALETTES[b.palette % COVER_PALETTES.length];
        body.innerHTML = `
        <div style="padding:40px 28px;text-align:center;">
            <div style="width:120px;height:170px;background:${pal};border-radius:10px;display:inline-flex;align-items:center;justify-content:center;color:#fff;font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:700;margin-bottom:20px;padding:12px;">${escHtml(b.title)}</div>
            <h2 style="font-family:'Playfair Display',serif;margin-bottom:6px;">${escHtml(b.title)}</h2>
            <p style="color:var(--text-secondary);margin-bottom:10px;">by ${escHtml(b.author)}</p>
            ${b.desc ? `<p style="max-width:480px;margin:0 auto 20px;color:#555;font-size:0.93rem;">${escHtml(b.desc)}</p>` : ''}
            <p style="color:#aaa;font-size:0.82rem;">No preview available. Purchase to read.</p>
        </div>`;
    }
    const footer = document.getElementById('readModalFooter');
    footer.innerHTML = `
        <button class="btn btn-outline" onclick="openBuyModal('${b.id}');closeReadModal()">🛒 Buy Now</button>
        <button class="btn btn-primary" onclick="closeReadModal()">Close</button>`;
    document.getElementById('readModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeReadModal() {
    document.getElementById('readModal').style.display = 'none';
    document.getElementById('readModalBody').innerHTML = '';
    document.body.style.overflow = '';
}

// ─── BUY MODAL ────────────────────────────────────────────────────────────────
function openBuyModal(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('buyModalSubtitle').textContent = b.title + ' — by ' + b.author;
    const links = document.getElementById('buyModalLinks');
    let html = '';
    if (b.amazon) html += `<a href="${escHtml(b.amazon)}" target="_blank" class="buy-store-btn"><span class="buy-store-icon">🛍</span><span><strong>Amazon</strong><br><small style="font-weight:400;color:var(--text-secondary)">amazon.in</small></span><span style="margin-left:auto">→</span></a>`;
    if (b.flipkart) html += `<a href="${escHtml(b.flipkart)}" target="_blank" class="buy-store-btn"><span class="buy-store-icon">📦</span><span><strong>Flipkart</strong><br><small style="font-weight:400;color:var(--text-secondary)">flipkart.com</small></span><span style="margin-left:auto">→</span></a>`;
    if (!html) html = `<p style="color:var(--text-secondary);text-align:center;padding:20px;">No purchase links available.</p>`;
    links.innerHTML = html;
    document.getElementById('buyModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeBuyModal() {
    document.getElementById('buyModal').style.display = 'none';
    document.body.style.overflow = '';
}

// ─── WISHLIST ─────────────────────────────────────────────────────────────────
function toggleWishlist(id, btn) {
    const idx = wishlist.indexOf(id);
    if (idx === -1) {
        wishlist.push(id);
        btn.textContent = '❤️';
        btn.classList.add('saved');
        showToast('Added to wishlist ❤️', 'success');
    } else {
        wishlist.splice(idx, 1);
        btn.textContent = '🤍';
        btn.classList.remove('saved');
        showToast('Removed from wishlist', 'info');
    }
    saveWishlist();
    updateWishDot();
}

function updateWishDot() {
    document.getElementById('wishDot').style.display = wishlist.length ? 'block' : 'none';
}

function openWishlistModal() {
    const container = document.getElementById('wishlistContent');
    if (!wishlist.length) {
        container.innerHTML = `<div style="text-align:center;padding:30px;color:var(--text-secondary);">💔 Your wishlist is empty.<br><small>Tap 🤍 on any book to save it.</small></div>`;
    } else {
        const items = wishlist.map(id => {
            const b = books.find(x => x.id === id);
            if (!b) return '';
            const fp = getDiscountedPrice(b.price, b.discount || 0);
            return `<div class="manage-item">
                <div class="manage-item-info">
                    <div class="manage-item-title">${escHtml(b.title)}</div>
                    <div class="manage-item-meta">${escHtml(b.author)} · ${b.free ? 'FREE' : '₹' + fp}</div>
                </div>
                <div style="display:flex;gap:6px;">
                    <button class="btn btn-sm btn-primary" onclick="openBuyModal('${b.id}')">Buy</button>
                    <button class="btn btn-sm btn-outline" onclick="removeFromWishlistModal('${b.id}')">✕</button>
                </div>
            </div>`;
        }).join('');
        container.innerHTML = items || '';
    }
    document.getElementById('wishlistModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeWishlistModal() {
    document.getElementById('wishlistModal').style.display = 'none';
    document.body.style.overflow = '';
}
function removeFromWishlistModal(id) {
    wishlist = wishlist.filter(x => x !== id);
    saveWishlist();
    updateWishDot();
    openWishlistModal();
    renderBooks();
}

// ─── AUTHOR PANEL ─────────────────────────────────────────────────────────────
function toggleAuthorPanel() {
    authorPanelOpen = !authorPanelOpen;
    const panel = document.getElementById('authorPanel');
    const btn = document.getElementById('authorToggleBtn');
    panel.classList.toggle('visible', authorPanelOpen);
    btn.classList.toggle('active-author', authorPanelOpen);
    if (authorPanelOpen) renderAuthorPanel();
    renderBooks();
}

function renderAuthorPanel() {
    document.getElementById('authorPanelContent').innerHTML = `
        <div class="form-grid">
            <div class="form-group"><label>Title *</label><input id="aTitle" placeholder="Book title"></div>
            <div class="form-group"><label>Author *</label><input id="aAuthor" value="Bibek Debroy" placeholder="Author name"></div>
            <div class="form-group"><label>Category</label>
                <select id="aCat">
                    <option>Spiritual</option><option>Fiction</option><option>Non-Fiction</option>
                    <option>Science</option><option>History</option><option>Poetry</option><option>Business</option>
                </select>
            </div>
            <div class="form-group"><label>Publish Date</label><input type="date" id="aDate"></div>
            <div class="form-group"><label>Price (₹)</label><input type="number" id="aPrice" placeholder="299"></div>
            <div class="form-group"><label>Discount (%)</label><input type="number" id="aDisc" min="0" max="90" placeholder="0"></div>
            <div class="form-group full-w"><label>Cover Image URL</label><input id="aCoverUrl" placeholder="https://..."></div>
            <div class="form-group full-w"><label>Read/PDF URL (optional)</label><input id="aReadUrl" placeholder="https://..."></div>
            <div class="form-group full-w"><label>Amazon Link</label><input id="aAmazon" placeholder="https://www.amazon.in/dp/..."></div>
            <div class="form-group full-w"><label>Flipkart Link</label><input id="aFlipkart" placeholder="https://www.flipkart.com/..."></div>
            <div class="form-group full-w"><label>Description</label><textarea id="aDesc" rows="2" placeholder="Short description..."></textarea></div>
            <div class="checkbox-row full-w"><input type="checkbox" id="aFree" id="aFree"><label for="aFree">📖 Make FREE to Read</label></div>
        </div>
        <div class="panel-actions">
            <button class="btn btn-primary" onclick="addBook()">➕ Add Book</button>
            <button class="btn btn-outline" onclick="clearAddForm()">Clear</button>
        </div>
        <div class="copyright-section">
            <div style="font-weight:600;font-size:0.88rem;margin-bottom:10px;color:var(--text-secondary);">📋 Manage Books</div>
            <div class="manage-list" id="manageList"></div>
        </div>`;
    renderManageList();
}

function renderManageList() {
    const list = document.getElementById('manageList');
    if (!list) return;
    if (!books.length) { list.innerHTML = '<p style="color:#aaa;font-size:0.82rem;padding:8px;">No books yet.</p>'; return; }
    list.innerHTML = books.map(b => `
        <div class="manage-item">
            <div class="manage-item-info">
                <div class="manage-item-title">${escHtml(b.title)}</div>
                <div class="manage-item-meta">${escHtml(b.author)} · ${b.category}</div>
            </div>
            <div style="display:flex;gap:6px;flex-shrink:0;">
                <button class="btn btn-sm btn-outline" onclick="openEditModal('${b.id}')">✏️</button>
                <button class="btn btn-sm btn-danger" onclick="deleteBook('${b.id}')">🗑</button>
            </div>
        </div>`).join('');
}

function addBook() {
    const title = document.getElementById('aTitle').value.trim();
    const author = document.getElementById('aAuthor').value.trim();
    if (!title || !author) { showToast('Title and Author are required', 'error'); return; }
    const newBook = {
        id: 'book_' + Date.now(),
        title, author,
        category: document.getElementById('aCat').value,
        date: document.getElementById('aDate').value,
        price: parseFloat(document.getElementById('aPrice').value) || 0,
        discount: parseFloat(document.getElementById('aDisc').value) || 0,
        free: document.getElementById('aFree').checked,
        amazon: document.getElementById('aAmazon').value.trim(),
        flipkart: document.getElementById('aFlipkart').value.trim(),
        coverUrl: document.getElementById('aCoverUrl').value.trim(),
        readUrl: document.getElementById('aReadUrl').value.trim(),
        desc: document.getElementById('aDesc').value.trim(),
        palette: Math.floor(Math.random() * COVER_PALETTES.length)
    };
    books.unshift(newBook);
    saveBooks();
    buildCategoryPills();
    renderBooks();
    renderManageList();
    clearAddForm();
    showToast('Book added! 📚', 'success');
}

function clearAddForm() {
    ['aTitle','aAuthor','aDate','aPrice','aDisc','aCoverUrl','aReadUrl','aAmazon','aFlipkart','aDesc'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = id === 'aAuthor' ? 'Bibek Debroy' : '';
    });
    const freeEl = document.getElementById('aFree');
    if (freeEl) freeEl.checked = false;
}

function deleteBook(id) {
    if (!confirm('Delete this book?')) return;
    books = books.filter(b => b.id !== id);
    wishlist = wishlist.filter(w => w !== id);
    saveBooks(); saveWishlist();
    updateWishDot();
    buildCategoryPills();
    renderBooks();
    renderManageList();
    showToast('Book deleted', 'info');
}

// ─── EDIT MODAL ───────────────────────────────────────────────────────────────
function openEditModal(id) {
    const b = books.find(x => x.id === id);
    if (!b) return;
    document.getElementById('editBookId').value = b.id;
    document.getElementById('eTitle').value = b.title;
    document.getElementById('eAuthor').value = b.author;
    document.getElementById('eDate').value = b.date || '';
    document.getElementById('eCat').value = b.category;
    document.getElementById('ePrice').value = b.price;
    document.getElementById('eDisc').value = b.discount || 0;
    document.getElementById('eFree').checked = !!b.free;
    document.getElementById('eAmazon').value = b.amazon || '';
    document.getElementById('eFlipkart').value = b.flipkart || '';
    document.getElementById('eCoverUrl').value = b.coverUrl || '';
    document.getElementById('eReadUrl').value = b.readUrl || '';
    document.getElementById('eDesc').value = b.desc || '';
    document.getElementById('editModal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
}
function closeEditModal() {
    document.getElementById('editModal').style.display = 'none';
    document.body.style.overflow = '';
}
function saveEditBook() {
    const id = document.getElementById('editBookId').value;
    const b = books.find(x => x.id === id);
    if (!b) return;
    b.title    = document.getElementById('eTitle').value.trim() || b.title;
    b.author   = document.getElementById('eAuthor').value.trim() || b.author;
    b.date     = document.getElementById('eDate').value;
    b.category = document.getElementById('eCat').value;
    b.price    = parseFloat(document.getElementById('ePrice').value) || 0;
    b.discount = parseFloat(document.getElementById('eDisc').value) || 0;
    b.free     = document.getElementById('eFree').checked;
    b.amazon   = document.getElementById('eAmazon').value.trim();
    b.flipkart = document.getElementById('eFlipkart').value.trim();
    b.coverUrl = document.getElementById('eCoverUrl').value.trim();
    b.readUrl  = document.getElementById('eReadUrl').value.trim();
    b.desc     = document.getElementById('eDesc').value.trim();
    saveBooks();
    buildCategoryPills();
    renderBooks();
    if (authorPanelOpen) renderManageList();
    closeEditModal();
    showToast('Book updated ✅', 'success');
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg, type = 'info') {
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = msg;
    document.getElementById('toastContainer').appendChild(t);
    setTimeout(() => t.remove(), 3200);
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function escHtml(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── KEYBOARD ─────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') {
        closeReadModal(); closeBuyModal(); closeEditModal(); closeWishlistModal();
    }
});

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
